<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат-бот: Инспектор РТН</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e9ecef;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .chat-window {
            max-width: 700px;
            width: 100%;
            height: 85vh;
            max-height: 750px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #1e4663;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .support-avatar {
            width: 42px;
            height: 42px;
            background: #ff9800;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 28px;
        }
        .support-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-info h3 {
            font-size: 1rem;
            margin-bottom: 2px;
        }
        .header-info p {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f7f9fc;
        }
        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 90%;
        }
        .message-row.inspector {
            align-self: flex-start;
        }
        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .msg-bubble {
            max-width: 100%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .inspector .msg-bubble {
            background: #eef2f7;
            color: #1e2a3e;
            border-bottom-left-radius: 6px;
        }
        .user .msg-bubble {
            background: #1e4663;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .options-panel {
            padding: 12px 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background: #f0f4fa;
            border: 2px solid #cbdbe2;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #1e3b5c;
        }
        .option-btn:hover {
            background: #e2e9f3;
            border-color: #ff9800;
        }
        .restart-btn {
            background: #6c7e97;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 10px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            text-align: center;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            padding: 8px;
            background: #f1f4f9;
            color: #6f8faa;
        }
        @media (max-width: 550px) {
            .message-row {
                max-width: 98%;
            }
            .msg-bubble {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="chat-window">
    <div class="chat-header">
        <div class="support-avatar" id="inspectorAvatar">
            👮‍♀️
        </div>
        <div class="header-info">
            <h3>Инспектор Ростехнадзора</h3>
            <p>Онлайн • проверка документов</p>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="options-panel" id="optionsPanel"></div>
    <footer>💡 Выберите вариант ответа. Инспектор подскажет, если ошибётесь.</footer>
</div>

<script>
    // ===================== НАСТРОЙКА ФОТО =====================
    const INSPECTOR_IMG_URL = "";   // например: "images/inspector.jpg"
    const USER_IMG_URL = "";        // например: "images/specialist.jpg"
    // ============================================================
    
    // Диалог — ПОЛНОСТЬЮ СООТВЕТСТВУЕТ ВАШЕМУ ДЕРЕВУ
    const dialogSteps = [
        {
            inspectorMessage: "Добрый день. Смотрю ваш журнал производственного контроля. За последние два месяца — ни одной записи. Как так?",
            options: [
                { text: "Все нарушения исправили на месте, записывать нечего было", isCorrect: false, correctAnswer: "Извините, это нарушение. Сейчас составим акт и восстановим записи.", explanation: "Если нет записи — для меня это значит, что проверки не было." },
                { text: "Забыл, это ж просто формальность, сейчас допишу", isCorrect: false, correctAnswer: "Извините, это нарушение. Сейчас составим акт и восстановим записи.", explanation: "Отсутствие журнала — грубое нарушение по статье 9.1 КоАП." },
                { text: "Извините, это нарушение. Сейчас составим акт и восстановим записи.", isCorrect: true, correctAnswer: "Извините, это нарушение. Сейчас составим акт и восстановим записи.", explanation: "Признание и действия — правильный шаг." }
            ]
        },
        {
            inspectorMessage: "Хорошо. Теперь к вопросу об ответственности. Что грозит вам лично за такое нарушение?",
            options: [
                { text: "Предупреждение, я же первый раз", isCorrect: false, correctAnswer: "Штраф 20–30 тысяч рублей, при повторении — дисквалификация до 3 лет.", explanation: "За грубое нарушение предупреждения нет." },
                { text: "Штраф тысяч пять, не больше", isCorrect: false, correctAnswer: "Штраф 20–30 тысяч рублей, при повторении — дисквалификация до 3 лет.", explanation: "По статье 9.1 КоАП — 20–30 тысяч, а не 5." },
                { text: "Штраф 20–30 тысяч рублей, при повторении — дисквалификация до 3 лет.", isCorrect: true, correctAnswer: "Штраф 20–30 тысяч рублей, при повторении — дисквалификация до 3 лет.", explanation: "Это прямо прописано в КоАП." }
            ]
        },
        {
            inspectorMessage: "А что будет с самой компанией, если я составлю протокол?",
            options: [
                { text: "Приостановят работу на месяц", isCorrect: false, correctAnswer: "Штраф от 200 до 300 тысяч рублей.", explanation: "Приостановка — крайняя мера, а штраф — 200–300 тысяч." },
                { text: "Да ничего страшного, заплатим и всё", isCorrect: false, correctAnswer: "Штраф от 200 до 300 тысяч рублей.", explanation: "Сумма серьёзная. Для юрлица — от 200 до 300 тысяч." },
                { text: "Штраф от 200 до 300 тысяч рублей.", isCorrect: true, correctAnswer: "Штраф от 200 до 300 тысяч рублей.", explanation: "Именно такая сумма по статье 9.1 КоАП." }
            ]
        },
        {
            inspectorMessage: "И последнее. Как вы расцениваете отсутствие журнала ПК — это мелочь или серьёзное нарушение?",
            options: [
                { text: "Мелочь, бывает", isCorrect: false, correctAnswer: "Грубое нарушение, как неисправный предохранительный клапан.", explanation: "Для нас это грубое нарушение." },
                { text: "Средней тяжести", isCorrect: false, correctAnswer: "Грубое нарушение, как неисправный предохранительный клапан.", explanation: "Это грубое нарушение." },
                { text: "Грубое нарушение, как неисправный предохранительный клапан.", isCorrect: true, correctAnswer: "Грубое нарушение, как неисправный предохранительный клапан.", explanation: "Журнал — это не бумажка, а часть безопасности." }
            ]
        }
    ];

    let currentStep = 0;
    let waitingForAnswer = true;
    const messagesArea = document.getElementById('messagesArea');
    const optionsPanel = document.getElementById('optionsPanel');

    function getAvatarHTML(type) {
        if (type === 'inspector') {
            if (INSPECTOR_IMG_URL) {
                return `<img src="${INSPECTOR_IMG_URL}" alt="Инспектор">`;
            }
            return "👮‍♀️";
        } else {
            if (USER_IMG_URL) {
                return `<img src="${USER_IMG_URL}" alt="Специалист">`;
            }
            return "👨‍💼";
        }
    }

    function addInspectorMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row inspector';
        row.innerHTML = `
            <div class="msg-avatar">${getAvatarHTML('inspector')}</div>
            <div class="msg-bubble">${text}</div>
        `;
        messagesArea.appendChild(row);
        scrollToBottom();
    }

    function addUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row user';
        row.innerHTML = `
            <div class="msg-avatar">${getAvatarHTML('user')}</div>
            <div class="msg-bubble">${text}</div>
        `;
        messagesArea.appendChild(row);
        scrollToBottom();
    }

    function addExplanation(text, isError = false) {
        const row = document.createElement('div');
        row.className = 'message-row inspector';
        let bubbleStyle = isError ? 'style="background:#ffe6e5; border-left: 4px solid #d9534f;"' : 'style="background:#e0f2e9; border-left: 4px solid #2e7d64;"';
        row.innerHTML = `
            <div class="msg-avatar">${getAvatarHTML('inspector')}</div>
            <div class="msg-bubble" ${bubbleStyle}>${text}</div>
        `;
        messagesArea.appendChild(row);
        scrollToBottom();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function endDialog() {
        const row = document.createElement('div');
        row.className = 'message-row inspector';
        row.innerHTML = `
            <div class="msg-avatar">${getAvatarHTML('inspector')}</div>
            <div class="msg-bubble" style="background:#e0f2e9;">🎉 Отлично! Теперь вы знаете, чем грозит организации и лично вам отсутствие журнала ПК. Желаю не попадать в такие ситуации!</div>
        `;
        messagesArea.appendChild(row);
        scrollToBottom();
        optionsPanel.innerHTML = '<button class="restart-btn" id="restartChatBtn">🔄 Пройти заново</button>';
        const restartBtn = document.getElementById('restartChatBtn');
        if (restartBtn) restartBtn.addEventListener('click', () => location.reload());
        waitingForAnswer = false;
    }

    function onSelectOption(option, stepIndex) {
        if (!waitingForAnswer) return;
        
        addUserMessage(option.text);
        
        if (option.isCorrect) {
            addExplanation(`✅ Верно. ${option.explanation}`);
        } else {
            // Используем explanation как есть — в нём уже содержатся нужные фразы
            addExplanation(`❌ Неверный подход. Это нарушение. Правильный ответ: «${option.correctAnswer}». ${option.explanation}`, true);
        }
        
        waitingForAnswer = false;
        
        setTimeout(() => {
            if (stepIndex + 1 < dialogSteps.length) {
                currentStep++;
                const nextStep = dialogSteps[currentStep];
                addInspectorMessage(nextStep.inspectorMessage);
                renderOptionsForStep(currentStep);
                waitingForAnswer = true;
            } else {
                endDialog();
            }
        }, 1000);
    }

    function renderOptionsForStep(stepIndex) {
        if (stepIndex >= dialogSteps.length) return;
        const step = dialogSteps[stepIndex];
        optionsPanel.innerHTML = '';
        step.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.addEventListener('click', () => onSelectOption(opt, stepIndex));
            optionsPanel.appendChild(btn);
        });
        const restartBtn = document.createElement('button');
        restartBtn.innerText = '🔄 Начать сначала';
        restartBtn.className = 'restart-btn';
        restartBtn.addEventListener('click', () => location.reload());
        optionsPanel.appendChild(restartBtn);
    }

    function initChat() {
        messagesArea.innerHTML = '';
        addInspectorMessage(dialogSteps[0].inspectorMessage);
        renderOptionsForStep(0);
        waitingForAnswer = true;
        currentStep = 0;
    }
    
    initChat();
</script>
</body>
</html>
